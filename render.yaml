services:
  - type: web
    name: ai-opportunity-radar-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-opportunity-radar-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://ai-opportunity-radar.onrender.com,https://ai-opportunity-radar-web.onrender.com
      - key: FRONTEND_URL
        value: https://ai-opportunity-radar.onrender.com
  - type: web
    name: ai-opportunity-radar
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://ai-opportunity-radar-api.onrender.com
  - type: cron
    name: ai-opportunity-radar-hourly-refresh
    runtime: python
    plan: free
    rootDir: backend
    schedule: "0 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python update_news.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-opportunity-radar-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: ai-opportunity-radar-db
    databaseName: ai_opportunity_radar
    user: ai_opportunity_radar
    plan: free
    postgresMajorVersion: "16"
