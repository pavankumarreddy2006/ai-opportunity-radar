services:
  - type: web
    name: ai-news-collector-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-news-collector-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        fromService:
          name: ai-news-collector-web
          type: web
          property: host
  - type: web
    name: ai-news-collector-web
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        fromService:
          name: ai-news-collector-api
          type: web
          property: host
  - type: cron
    name: ai-news-collector-hourly-refresh
    runtime: python
    plan: free
    rootDir: backend
    schedule: "0 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python update_news.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-news-collector-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: ai-news-collector-db
    databaseName: ai_news_collector
    user: ai_news_collector
    plan: free
    postgresMajorVersion: "16"
