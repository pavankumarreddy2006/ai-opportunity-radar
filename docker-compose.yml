services:
  db:
    image: postgres:16-alpine
    container_name: ai-opportunity-radar-db
    environment:
      POSTGRES_DB: ai_opportunity_radar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_opportunity_radar"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

